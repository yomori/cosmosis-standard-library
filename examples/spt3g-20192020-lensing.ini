[runtime]
sampler      = test
root         = ${PWD}
resume       = T
verbosity    = noisy

[test]
save_dir     = output/spt3g_20192020_lensing
fatal_errors = T

[nautilus]
n_live       = 1500
verbose      = T

[emcee]
walkers      = 64
samples      = 1000
nsteps       = 5


[pipeline]
; these names refer to sections later in the file:
modules = consistency camb spt3g_20192020_lensing
values  = examples/spt3g-20192020-lensing-values.ini
priors  = examples/spt3g-20192020-lensing-priors.ini
debug   = F
timing  = F
extra_output = cosmological_parameters/sigma_8 cosmological_parameters/omega_m

[spt3g_20192020_lensing]
file             = ./likelihood/spt3g/candl_cosmosis_interface.py  ; Location of interface code
dataset          = 'SPT3G_20192020_lensing_GMV'                    ; Name of dataset to use
like_corrections = T                                               ; Apply corrections 
marginalize_sys  = T                                               ; Load emulaltor and marginalize over cal/beam/fg 
with_cmb         = T                                               ; Combining with CMB primary o not

#[spt3g_tteete]
#file             = ./likelihood/spt3g/candl_cosmosis_interface.py ; Location of interface code
#dataset          = 'SPT3G_20192020_TTEETE'                        ; Name of dataset to use
#data_directory   = ./data/spt3g/                                  ; Directly of where all the datasets are stored


[output]
filename = output/spt3g-1920-lens.txt

; The consistency module translates between our chosen parameterization
; and any other that modules in the pipeline may want (e.g. camb)
[consistency]
file = ./utility/consistency/consistency_interface.py
cosmomc_theta = T

[camb]
file = boltzmann/camb/camb_interface.py
feedback = 0                   ; verbosity of output
mode     = cmb                 ; mode to run camb. For CMB lensing only, cmb is sufficient 
lmax     = 4000                ; max ell to use for cmb calculation
lens_margin     = 1250         ; Lmax
AccuracyBoost   = 1.0          ; CAMB accuracy boost parameter
lSampleBoost    = 1.0          ; CAMB lsample boost parameter
lAccuracyBoost  = 1.0          ; CAMB lAccuracy boost parameter
lens_potential_accuracy = 4    ; CAMB lens_potential accuracy paramater
do_tensors      = T            ;include tensor modes
do_lensing      = T            ;lensing is required w/ Planck data
NonLinear       = lens         ; Non-linear calculation
theta_H0_range  = "20 100"     ; Set bounds in H0
halofit_version = takahashi    ; Halofit version 
